<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarjeta de Perfil - Flexbox</title>
  <style>
    /* RESET Y ESTILOS BASE */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0f172a;
      /* Fondo con patrón de malla moderno */
      background-image: radial-gradient(#1e293b 1px, transparent 1px);
      background-size: 20px 20px;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* CONTENEDOR PRINCIPAL - DISEÑO DARK NEÓN */
    .profile-card {
      background: #1e293b;
      width: 350px;
      padding: 30px;
      border-radius: 20px;
      position: relative;
      /* Borde sutil de neón */
      border: 1px solid rgba(99, 102, 241, 0.2);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      overflow: hidden;
    }

    /* Adorno decorativo de color en la parte superior */
    .profile-card::before {
      content: "";
      position: absolute;
      top: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899);
    }

    /* HEADER Y AVATAR */
    .header-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 24px; /* Avatar cuadrado redondeado */
      border: 2px solid #6366f1;
      object-fit: cover;
      padding: 5px;
      background: #0f172a;
      transform: rotate(-3deg);
      transition: all 0.3s ease;
    }

    .profile-card:hover .avatar {
      transform: rotate(0deg) scale(1.05);
      border-color: #a855f7;
    }

    .user-info {
      text-align: center;
    }

    .user-info h1 {
      font-size: 1.5rem;
      color: #f8fafc;
      font-weight: 700;
    }

    .user-info span {
      color: #94a3b8;
      font-size: 0.9rem;
      font-family: monospace;
    }

    .bio {
      text-align: center;
      font-size: 0.9rem;
      color: #94a3b8;
      line-height: 1.6;
      border-left: 2px solid #6366f1;
      padding-left: 10px;
    }

    /* ESTADÍSTICAS ESTILO CÁPSULA */
    .stats-container {
      display: flex;
      width: 100%;
      justify-content: space-between;
      padding: 15px;
      background: rgba(15, 23, 42, 0.5);
      border-radius: 12px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-item strong {
      display: block;
      font-size: 1.1rem;
      color: #6366f1;
    }

    .stat-item p {
      font-size: 0.65rem;
      color: #64748b;
      font-weight: 700;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* BOTONES MINIMALISTAS */
    .actions-container {
      display: flex;
      width: 100%;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary { 
      background: #6366f1; 
      color: white; 
    }

    .btn-primary:hover { 
      background: #4f46e5;
      box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
    }

    .btn-secondary { 
      background: transparent; 
      color: #f8fafc; 
      border: 1px solid #334155;
    }

    .btn-secondary:hover { 
      background: #334155;
    }

    /* PROYECTOS EN PERSPECTIVA */
    .projects-grid {
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .projects-grid img {
      width: 80px;
      height: 60px;
      border-radius: 6px;
      object-fit: cover;
      opacity: 0.7;
      transition: all 0.3s ease;
      filter: grayscale(100%);
    }

    .projects-grid img:hover {
      opacity: 1;
      filter: grayscale(0%);
      transform: translateY(-5px);
    }
  </style>
</head>
<body>

  <div class="profile-card">
    <header class="header-section">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQe2tA93cHNVrzi6mJuHmLVcH6pqTNCvM16iA&s" alt="Avatar" class="avatar">
      <div class="user-info">
        <h1>Tomas Agudelo</h1>
        <span>@taj__03</span>
      </div>
    </header>

    <p class="bio">Desarrollador, amante de los juegos y creador de contenido.</p>

    <div class="stats-container">
      <div class="stat-item">
        <strong>65</strong>
        <p>Proyectos</p>
      </div>
      <div class="stat-item">
        <strong>200M</strong>
        <p>Seguidores</p>
      </div>
      <div class="stat-item">
        <strong>15</strong>
        <p>Siguiendo</p>
      </div>
    </div>

    <div class="actions-container">
      <button class="btn btn-primary">Seguir</button>
      <button class="btn btn-secondary">Mensaje</button>
    </div>

    <div class="projects-grid">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRY_f7TRPYfo6KhlwCDqvMr9hI11TquF9JZkAxrzAtFKfsFlGNbUHoYmwD-aNxA2OK-GktxgqXhgtX3FxBfQ5kSMPl-XTP0xeKJlBlmhIU&s" alt="P1">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTmHZ5c76mgfsADek9MmeTNkjLffhQvPEywxQ&s" alt="P2">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRDhwR2xfWnZ1dh5lg2rdgpgnHbKI-hu6EDwA&s" alt="P3">
    </div>
  </div>

</body>
</html>
